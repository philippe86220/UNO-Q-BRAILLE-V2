<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UNO Q Braille Trainer</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
      margin: 0;
      padding: 30px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .panel {
      background: #111827;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .row {
      margin-top: 10px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 18px;
      width: 220px;
    }

    button {
      padding: 10px 16px;
      margin-left: 8px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.05);
    }

    .braille-cell {
      display: grid;
      grid-template-columns: 70px 70px;
      gap: 16px 18px;
      margin-top: 20px;
    }

    .dot {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #1f2937;
    }

    #status {
      margin-top: 18px;
      color: #93c5fd;
      font-size: 18px;
    }

    .number {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>UNO Q Braille Trainer</h1>

    <section class="panel">
      <label for="letterInput">Lettre</label>
      <div class="row">
        <input id="letterInput" type="text" maxlength="1" value="A">
        <button id="showBtn" type="button">Afficher</button>
        <button id="offBtn" type="button">Eteindre</button>
        <button id="onBtn" type="button">Tout allumer</button>
      </div>
    </section>

    <section class="panel">
      <h2>Cellule Braille</h2>

      <div class="braille-cell">
        <div class="dot" data-dot="1"></div>
        <div class="dot" data-dot="4"></div>

        <div class="dot" data-dot="2"></div>
        <div class="dot" data-dot="5"></div>

        <div class="dot" data-dot="3"></div>
        <div class="dot" data-dot="6"></div>
      </div>

      <div id="status">Pret</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
